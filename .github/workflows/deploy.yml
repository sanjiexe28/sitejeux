name: Deploy changed files to Ludoshop

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Detect changed files
        run: |
          git diff --name-only --diff-filter=ACMR HEAD~1 HEAD > changed-files.txt
          cat changed-files.txt

      - name: Copy only changed files
        run: |
          if [ -s changed-files.txt ]; then
            rsync -avz --relative \
              --files-from=changed-files.txt \
              -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
              ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/ludoshop/
          else
            echo "No changed files to deploy"
          fi
